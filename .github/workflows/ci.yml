name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[dev]"
      - name: Lint
        run: python -m ruff check .
      - name: Test
        env:
          OPENAI_API_KEY: test-key-for-unit-tests
          ANTHROPIC_API_KEY: test-key-for-unit-tests
          ACGS2_SERVICE_SECRET: test-secret-for-unit-tests
        run: |
          python -m pytest \
            tests/agent_bus/test_advanced.py \
            api/tests/test_app_coverage.py::TestCreateApp::test_create_app_returns_fastapi_instance \
            tests/test_ext_shim_fallbacks.py \
            tests/test_split_surface_cleanup.py \
            tests/test_data_flywheel_metrics.py \
            tests/test_vulnerable_fallbacks.py \
            --import-mode=importlib \
            -m "not slow and not benchmark and not e2e" \
            -v --tb=short

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build tools
        run: python -m pip install --upgrade pip setuptools wheel build twine
      - name: Build
        run: python -m build --wheel --sdist
      - name: Validate
        run: twine check dist/*
